<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韓語單字大挑戰 - 關卡版</title>
    <style>
        html, body {margin: 0;padding: 0;width: 100%;min-height: 100dvh;overflow-x: hidden;overflow-y: auto;overscroll-behavior: none;touch-action: manipulation;}
        body { font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { max-width:820px; width:100%; margin:0 auto; background:white; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.2); overflow:visible; min-height:100dvh; }
        header { background: #4c51bf; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 22px; }
        .score-display { font-size: 18px; font-weight: bold; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .toggle-group { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .toggle-group button { background: rgba(255,255,255,0.2); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .content { padding: 25px 20px; }
        button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: #4c51bf; color: white; }
        .question { font-size: 28px; font-weight: bold; text-align: center; margin: 15px 0; }
        .speak-btn { background: #4c51bf; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 20px; cursor: pointer; }
        .example-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; margin: 12px 0 20px; }
        .example-en { font-size: 16px; color: #334155; margin-bottom: 8px; }
        .example-zh { font-size: 15px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 8px; margin-top: 8px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 16px 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-size: 17px; display: flex; align-items: center; gap: 10px; }
        .option-letter { font-weight: bold; color: #4c51bf; min-width: 26px; font-size: 18px; }
        .timer { font-size: 24px; font-weight: bold; color: #e11d48; text-align: center; margin-bottom: 8px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 20px; }
        .progress { height: 100%; background: #4c51bf; transition: width 0.3s; }
        .screen { display: none; }
        .screen.active { display: block; }
        .result { text-align: center; }
        .score { font-size: 64px; font-weight: 800; margin: 10px 0; }
        .listening { color: #e11d48; font-weight: bold; text-align: center; margin-top: 15px; font-size: 16px; }
        .voice-hint { text-align: center; color: #666; font-size: 15px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>韓語單字大挑戰</h1>
                <div id="levelDisplay" style="font-size:14px; color:#ddd;">第 1 關</div>
            </div>
            <div class="score-display">
                總分: <span id="totalScoreDisplay">0</span>
            </div>
            <div class="controls">
                <div class="toggle-group">
                    <button id="voiceToggle" onclick="toggleVoice()">🔊</button>
                </div>
                <div class="toggle-group">
                    <button id="micToggle" onclick="toggleMic()">🎤</button>
                </div>
            </div>
        </header>

        <!-- 開始畫面 -->
        <div id="startScreen" class="content screen active">
            <h2 style="text-align:center;">準備好了嗎？</h2>
            <p style="text-align:center; color:#666; font-size:15px;">第一關 10 題 • 之後每關 +5 題 • 100% 過關</p>
            <div style="text-align:center; margin:40px 0;">
                <button onclick="startGame()" style="font-size:22px; padding:16px 55px;">開始遊戲</button>
            </div>
        </div>

        <!-- 測驗畫面 -->
        <div id="quizScreen" class="content screen">
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:10px;">
    <button id="pauseBtn" onclick="pauseGame()" style="background:#f59e0b;">⏸️ 暫停</button>
    <button onclick="backToStart()" style="background:#ef4444;">🔄 重新開始</button>
</div>
            <div class="timer" id="timer">40:00</div>
            <div class="progress-bar"><div class="progress" id="progress" style="width:0%"></div></div>
            <div id="qnum" style="text-align:center; color:#666; margin-bottom:8px;">1 / 10</div>

            <div class="question" id="question"></div>
            <div class="example-box" id="exampleBox"></div>
            <div class="options" id="options"></div>

            <div class="voice-hint">
                🎤 語音答題：請說 <strong>A / B / C / D</strong> 或直接說<strong>中文意思</strong>
            </div>
            <div class="listening" id="listeningStatus" style="display:none;">
                正在聆聽答案...
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="resultScreen" class="content screen result">
            <h2 id="resultTitle">關卡結束</h2>
            <div class="score" id="finalScore"></div>
            <div id="resultMessage" style="font-size:20px; margin-bottom:25px;"></div>

            <div style="margin-top:20px;">
                <button onclick="restartFromLevel1()" style="background:#3b82f6; margin:6px;">重第一關開始</button>
                <button onclick="restartCurrentLevel()" style="background:#eab308; margin:6px;">再次闖關</button>
                <button id="nextButton" onclick="nextLevel()" style="background:#16a34a; margin:6px; display:none;">進入下一關</button>
            </div>

            <div style="margin-top:25px;">
                <button onclick="restartGame()" style="background:#e11d48; padding:14px 40px; font-size:18px;">重新開始</button>
            </div>
        </div>
    </div>

    <script>
      <script>

// ==================== 從 GitHub 載入單字 ====================
let vocabulary = [];
async function loadWords() {

    const response = await fetch("words.json");

    if (!response.ok) {

        throw new Error("無法載入 words.json");

    }

    vocabulary = await response.json();

    console.log("已載入", vocabulary.length, "個單字");

}

// ↓↓↓ 下面開始就是你原本的程式，不用動
        let currentLevel = 1;
        let currentQuiz = [];
        let currentIndex = 0;
        let levelScore = 0;           // 當前關卡得分
        let totalScore = 0;           // 累計總分（只有過關才加）
        let timerInterval = null;
        let timeLeft = 2400;
        let voiceEnabled = true;
        let micEnabled = true;
        let recognition = null;
        let isListening = false;
        let isPaused = false;
        let currentOptions = [];
        let wordsUsed = new Set();

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            document.getElementById('voiceToggle').textContent = voiceEnabled ? '🔊' : '🔇';
        }

        function toggleMic() {
            micEnabled = !micEnabled;
            document.getElementById('micToggle').textContent = micEnabled ? '🎤' : '🔇';
            if (!micEnabled && recognition) recognition.abort();
        }

        // ===== 載入 Android / iPhone 可用的語音 =====
let voices = [];

function loadVoices() {
    voices = speechSynthesis.getVoices();
}

loadVoices();

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}

// ===== 播放語音 =====
function speak(text, rate = 0.92, lang = 'zh-TW') {
    if (!voiceEnabled) return;

    if (!text) return;

    // 停止目前語音
    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.text = text;
    utterance.lang = lang;
    utterance.rate = rate;
    utterance.pitch = 1;
    utterance.volume = 1;

    // 尋找符合語言的語音
    let voice =
        voices.find(v => v.lang === lang) ||
        voices.find(v => v.lang.startsWith(lang.split('-')[0])) ||
        voices.find(v => v.default);

    if (voice) {
        utterance.voice = voice;
    }

    // Android（尤其小米）需要延遲一下才容易成功播放
    setTimeout(() => {
        speechSynthesis.speak(utterance);
    }, 100);
}

        function speakWord(word) {
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    speechSynthesis.speak(u);
}

        async function startGame() {
      alert("有按到開始");
    if (vocabulary.length === 0) {
        await loadWords();
    }

    currentLevel = 1;
    totalScore = 0;
    wordsUsed = new Set();

    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('quizScreen').classList.add('active');

    startLevel();
}

    } catch (e) {

        alert("錯誤：" + e.message);
        console.error(e);

    }
}

        function startLevel() {
            levelScore = 0;
            const numQuestions = 10 + (currentLevel - 1) * 5;

            let available = vocabulary.filter(w => !wordsUsed.has(w.word));
            currentQuiz = available.sort(() => Math.random() - 0.5).slice(0, numQuestions);
            currentQuiz.forEach(w => wordsUsed.add(w.word));

            currentIndex = 0;
              // ★ 每關重新設定40分鐘

            timeLeft = 2400;
            document.getElementById("timer").textContent = "40:00";
            document.getElementById('levelDisplay').textContent = `第 ${currentLevel} 關`;
            document.getElementById('totalScoreDisplay').textContent = totalScore;
            startTimer();
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuiz[currentIndex];
            document.getElementById('question').innerHTML = `${q.word} <button class="speak-btn" onclick="speakWord('${q.word}')">🔊</button>`;
            document.getElementById('qnum').textContent = `${currentIndex + 1} / ${currentQuiz.length}`;

            const ex = document.getElementById('exampleBox');
            ex.innerHTML = `
                <div class="example-en"><strong>例句：</strong>${q.example} <button onclick="speak('${q.example}', 0.9, 'ko-KR')">🔊</button></div>
                <div class="example-zh"><strong>中文：</strong>${q.example_zh}</div>
            `;

            let opts = [q.meaning_zh];
            while (opts.length < 4) {
                let r = vocabulary[Math.floor(Math.random() * vocabulary.length)].meaning_zh;
                if (!opts.includes(r)) opts.push(r);
            }
            opts = opts.sort(() => Math.random() - 0.5);
            currentOptions = opts;

            const letters = ['A','B','C','D'];
            const div = document.getElementById('options');
            div.innerHTML = '';
            opts.forEach((opt, i) => {
                const o = document.createElement('div');
                o.className = 'option';
                o.innerHTML = `<span class="option-letter">${letters[i]}.</span> ${opt}`;
                o.onclick = () => selectAnswer(letters[i], opt, q.meaning_zh);
                div.appendChild(o);
            });

            if (voiceEnabled) setTimeout(() => speakFullQuestion(q, opts, letters), 600);
            if (voiceEnabled && micEnabled) setTimeout(() => startVoiceRecognitionImproved(q.meaning_zh, opts), 5200);
        }

        function speakFullQuestion(q, opts, letters) {
            speak(q.word, 0.85, 'ko-KR');
            setTimeout(() => speak(q.example, 0.9, 'ko-KR'), 1300);
            setTimeout(() => {
                let p = `這個韓文字的意思是什麼？`;
                opts.forEach((opt,i) => p += ` ${letters[i]} 是 ${opt}。`);
                p += ` 請說 A、B、C 或 D。`;
                speak(p, 0.95, 'zh-TW');
            }, 3800);
        }

        function startVoiceRecognitionImproved(correctMeaning, optionsList) {
            if (!micEnabled) return;
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) return;

            if (recognition) recognition.abort();

            const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognitionAPI();
            recognition.lang = 'zh-TW';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 5;

            const status = document.getElementById('listeningStatus');
            status.style.display = 'block';
            isListening = true;

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.trim().toUpperCase();
                status.style.display = 'none';
                isListening = false;

                let chosen = null, selectedMeaning = null;
                if (transcript.includes('A') || transcript.includes('一')) { chosen = 'A'; selectedMeaning = optionsList[0]; }
                else if (transcript.includes('B') || transcript.includes('二')) { chosen = 'B'; selectedMeaning = optionsList[1]; }
                else if (transcript.includes('C') || transcript.includes('三')) { chosen = 'C'; selectedMeaning = optionsList[2]; }
                else if (transcript.includes('D') || transcript.includes('四')) { chosen = 'D'; selectedMeaning = optionsList[3]; }
                else {
                    for (let i = 0; i < optionsList.length; i++) {
                        if (transcript.includes(optionsList[i].toUpperCase())) {
                            chosen = ['A','B','C','D'][i];
                            selectedMeaning = optionsList[i];
                            break;
                        }
                    }
                }

                if (chosen && selectedMeaning) {
                    selectAnswer(chosen, selectedMeaning, currentQuiz[currentIndex].meaning_zh);
                } else {
                    status.style.display = 'block';
                    status.textContent = '沒聽清楚，請再說一次';
                    setTimeout(() => startVoiceRecognitionImproved(correctMeaning, optionsList), 1200);
                }
            };

            recognition.onerror = function() {
                status.style.display = 'none';
                isListening = false;
            };

            recognition.onend = function() {
                if (isListening && micEnabled) setTimeout(() => startVoiceRecognitionImproved(correctMeaning, optionsList), 500);
            };

            try { recognition.start(); } catch(e) {}
        }

        function selectAnswer(letter, selected, correct) {
            if (recognition) recognition.abort();
            document.getElementById('listeningStatus').style.display = 'none';
            isListening = false;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.includes(correct)) {
                    opt.style.background = '#86efac';
                    opt.style.borderColor = '#16a34a';
                } else if (opt.textContent.startsWith(letter + '.')) {
                    opt.style.background = '#fda4af';
                    opt.style.borderColor = '#e11d48';
                }
            });

            if (selected === correct) {
                levelScore++;
                document.getElementById('totalScoreDisplay').textContent = totalScore + levelScore;
            }

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < currentQuiz.length) {
                    showQuestion();
                } else {
                    finishLevel();
                }
            }, 750);
        }

     function startTimer() {

    clearInterval(timerInterval);

    timeLeft = 2400;

    document.getElementById("timer").textContent = "40:00";

    timerInterval = setInterval(() => {

        timeLeft--;

        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;

        document.getElementById("timer").textContent =
            `${min}:${sec < 10 ? "0" : ""}${sec}`;

        if (timeLeft <= 0) {
            finishLevel();
        }

    }, 1000);
}
        function finishLevel() {
            if (timerInterval) clearInterval(timerInterval);
            if (recognition) recognition.abort();

            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const percent = Math.round((levelScore / currentQuiz.length) * 100);
            document.getElementById('finalScore').textContent = `${percent}%`;

            const msgEl = document.getElementById('resultMessage');
            const nextBtn = document.getElementById('nextButton');

            if (percent === 100) {
                totalScore += levelScore;
                document.getElementById('totalScoreDisplay').textContent = totalScore;
                msgEl.innerHTML = `恭喜過關！本關得分：${levelScore}`;
                msgEl.style.color = '#16a34a';
                nextBtn.style.display = 'inline-block';
            } else {
                msgEl.innerHTML = `正確率 ${percent}% ，未達 100%，請重新挑戰`;
                msgEl.style.color = '#e11d48';
                nextBtn.style.display = 'none';
            }
        }

        function nextLevel() {
            currentLevel++;
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            startLevel();
        }

        function restartCurrentLevel() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            startLevel();
        }

        function restartFromLevel1() {
            currentLevel = 1;
            wordsUsed = new Set();
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            startLevel();
        }

        function restartGame() {
            totalScore = 0;
            currentLevel = 1;
            wordsUsed = new Set();
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
            document.getElementById('totalScoreDisplay').textContent = '0';
        }
        

// ===== 新增：暫停功能 =====
function pauseGame() {

    const btn = document.getElementById("pauseBtn");

    if (!isPaused) {

        isPaused = true;

        clearInterval(timerInterval);

        if (recognition) recognition.abort();

        speechSynthesis.cancel();

        document.getElementById("listeningStatus").style.display = "none";

        btn.textContent = "▶️ 繼續挑戰";

    } else {

        isPaused = false;

        btn.textContent = "⏸️ 暫停";

        startTimer();

        showQuestion();

    }

}

// ===== 新增：回開始畫面 =====
function backToStart(){

    if(confirm("確定重新開始嗎？")){

        clearInterval(timerInterval);

        if(recognition) recognition.abort();

        speechSynthesis.cancel();

        currentLevel = 1;
        totalScore = 0;
        levelScore = 0;
        currentIndex = 0;
        wordsUsed = new Set();
        timeLeft = 2400;

        document.getElementById("totalScoreDisplay").textContent = "0";

        document.getElementById("quizScreen").classList.remove("active");
        document.getElementById("resultScreen").classList.remove("active");
        document.getElementById("startScreen").classList.add("active");

    }

}

async function init() {

    document.getElementById('micToggle').textContent =
        micEnabled ? '🎤' : '🔇';

    try {
        await loadWords();
        console.log("已載入", vocabulary.length, "個單字");
    } catch (e) {
        alert("無法下載單字資料！");
        console.error(e);
    }
}

init();
    </script>
</body>
</html>
